server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Enable Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types 
        text/plain 
        text/css 
        text/xml 
        application/json 
        application/javascript 
        application/xml+rss 
        application/atom+xml 
        image/svg+xml 
        font/woff2;

    # Astro clean URLs support (e.g. /posts/my-post matches /posts/my-post.html or /posts/my-post/index.html)
    location / {
        try_files $uri $uri.html $uri/ /index.html =404;
    }

    # Highly-optimized browser caching for static resources (CSS, JS, Fonts, Images)
    location ~* \.(?:css|js|woff2?|svg|png|jpg|jpeg|gif|ico|webmanifest)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform, immutable";
        access_log off;
    }

    # Custom 404 routing
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }
}
